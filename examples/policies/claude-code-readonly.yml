transport:
  type: http
  addr: "0.0.0.0:4000"
  upstream: "http://localhost:3000/mcp"

audit:
  type: sqlite
  path: "gateway-audit.db"

agents:
  claude-code:
    allowed_tools:
      - echo
      - read_file
      - list_directory
      - search_files
      - grep
    denied_tools:
      - write_file
      - delete_file
      - "exec_*"
      - "shell_*"
      - "run_*"
      - secret_dump
    rate_limit: 60
    tool_rate_limits:
      echo: 20

default_policy:
  allowed_tools: []
  rate_limit: 10
  timeout_secs: 5

rules:
  block_prompt_injection: true
  filter_mode: block
  block_patterns:
    - "(?i)(api[_-]?key|access[_-]?token|secret|password)\\s*[=:]"
    - "Bearer\\s+[A-Za-z0-9._~+/-]+"
    - "AKIA[0-9A-Z]{16}"
    - "ghp_[A-Za-z0-9]{36,}"
    - "(?i)BEGIN\\s+(RSA\\s+|EC\\s+|OPENSSH\\s+)?PRIVATE\\s+KEY"
